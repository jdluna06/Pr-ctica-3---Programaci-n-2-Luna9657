<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detector de Estrellas</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#ffe8d6] flex flex-col items-center min-h-screen pt-12 font-sans text-slate-800">
    <div class="mb-8 bg-[#e6ccb2] p-8 rounded-2xl shadow-lg border border-[#e6ccb2] w-full max-w-lg text-center">
        <h2 class="text-3xl font-extrabold mb-2 text-[#718355]">Misión Sputnik</h2>
        <label class="block mb-2 text-sm font-medium text-[#6b705c] text-left"> Sube un archivo .in distinto</label>
        <input type="file" id="archivoEntrada" accept=".in,.txt" class="hidden">
        <label for="archivoEntrada" 
            class="flex justify-center items-center w-[50%] bg-[#718355] hover:bg-[#87986a] text-white text-sm font-bold py-3 px-4 rounded-lg shadow-md cursor-pointer transition-colors mb-6">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
            Seleccionar archivo
        </label>
        <button id="boton-ejecutar" class="w-full bg-[#718355] hover:bg-[#87986a] text-white font-bold py-3 px-6 rounded-lg shadow-md">
            Analisis
        </button>
        <p class="text-xs text-[#718355] mt-2">Se usará Estrellas.in por defecto.</p>
    </div>

    <div id="contenedor-resultados" class="hidden flex-col items-center w-full max-w-2xl pb-12">
        <h3 class="text-lg font-bold text-slate-700 mb-3 uppercase tracking-wider">Fotografía Procesada (estrellas.out)</h3>
        <div class="bg-slate-900 p-6 rounded-xl shadow-2xl border-4 border-slate-800 w-full overflow-x-auto flex justify-center">
            <pre id="pantalla-matriz" class="text-amber-400 font-mono text-lg leading-relaxed tracking-widest"></pre>
        </div>
        <button id="boton-descargar" class="mt-6 bg-[#718355] hover:bg-[#87986a] text-white font-bold py-2 px-6 rounded-full shadow-md">
            Descargar estrellas.out
        </button>
    </div>

    <script>
        class DetectorEstrellas {
            constructor() {
                this.filas = 0;
                this.columnas = 0;
                this.matrizCielo = [];      
                this.matrizResultado = [];  
            }

            cargarDatos(textoEntrada) {
                const datos = textoEntrada.trim().split(/\s+/).map(Number);
                if (datos.length < 2) return false; 

                this.filas = datos[0];
                this.columnas = datos[1];

                let indiceActual = 2; 
                this.matrizCielo = [];

                for (let i = 0; i < this.filas; i++) {
                    let fila = [];
                    for (let j = 0; j < this.columnas; j++) {
                        fila.push(datos[indiceActual] || 0); 
                        indiceActual++;
                    }
                    this.matrizCielo.push(fila);
                }
                return true; 
            }

            esEstrella(filaCentral, columnaCentral) {
                let sumaTotal = 0;

                for (let df = -1; df <= 1; df++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        let fVecino = filaCentral + df;
                        let cVecino = columnaCentral + dc;

                        if (fVecino >= 0 && fVecino < this.filas && cVecino >= 0 && cVecino < this.columnas) {
                            sumaTotal += this.matrizCielo[fVecino][cVecino];
                        }
                    }
                }
                return sumaTotal > 50;
            }

            procesarFotografia() {
                this.matrizResultado = []; 
                for (let i = 0; i < this.filas; i++) {
                    let filaResultado = [];
                    for (let j = 0; j < this.columnas; j++) {
                        filaResultado.push(this.esEstrella(i, j) ? '*' : ' ');
                    }
                    this.matrizResultado.push(filaResultado);
                }
            }

            generarSalidaFormateada() {
                let textoFinal = "";
                
                let cabecera = "  ";
                for (let c = 1; c <= this.columnas; c++) {
                    cabecera += c + " ";
                }
                textoFinal += cabecera + "\n";

                for (let f = 0; f < this.filas; f++) {
                    let linea = (f + 1) + " "; 
                    for (let c = 0; c < this.columnas; c++) {
                        linea += this.matrizResultado[f][c] + " ";
                    }
                    linea += (f + 1);
                    textoFinal += linea + "\n";
                }

                textoFinal += cabecera;
                return textoFinal;
            }
        }

        //Interfaz
        let textoSalidaGlobal = ""; 

        document.getElementById('boton-ejecutar').addEventListener('click', async function() {
            const inputArchivo = document.getElementById('archivoEntrada');
            
            // Si es subido
            if (inputArchivo.files.length > 0) {
                const archivo = inputArchivo.files[0];
                const lector = new FileReader();
                lector.onload = function(e) {
                    procesarArchivo(e.target.result);
                };
                lector.readAsText(archivo);
            } 
            // Usar el archivo predeterminado
            else {
                try {
                    const respuesta = await fetch('estrellas.in');
                    
                    if (!respuesta.ok) {
                        throw new Error('Archivo no encontrado');
                    }
                    
                    const contenidoLocal = await respuesta.text();
                    procesarArchivo(contenidoLocal);

                } catch (error) {
                    alert("No se pudo cargar estrellas.in \n Por favor, seleccione el archivo de forma manual(se encuentra en la propia carpeta del ejercicio).");
                    console.error(error);
                }
            }
        });

        function procesarArchivo(texto) {
            const detector = new DetectorEstrellas();
            
            if(detector.cargarDatos(texto)) {
                detector.procesarFotografia();
                textoSalidaGlobal = detector.generarSalidaFormateada();
                
                document.getElementById('contenedor-resultados').classList.remove('hidden');
                document.getElementById('contenedor-resultados').classList.add('flex');
                document.getElementById('pantalla-matriz').innerText = textoSalidaGlobal;
                
                console.log(textoSalidaGlobal);
            } else {
                alert("El archivo no tiene el formato correcto.");
            }
        }

        // Descarga
        document.getElementById('boton-descargar').addEventListener('click', function() {
            if (!textoSalidaGlobal) return;

            const blob = new Blob([textoSalidaGlobal], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = 'estrellas.out';
            
            document.body.appendChild(a);
            a.click();
            
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);
        });
    </script>
</body>
</html>
